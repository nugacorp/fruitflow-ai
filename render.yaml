# Blueprint de Render (capa gratuita): API FastAPI + Postgres + Redis.
# Nota: el plan free de Postgres expira a los 30 dias y el servicio web
# se duerme tras inactividad (tarda ~1 min en despertar).
services:
  - type: web
    name: fruitflow-api
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn backend.interfaces.http.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: fruitflow-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: fruitflow-redis
          property: connectionString
      - key: INTERNAL_API_KEY
        generateValue: true

  - type: keyvalue
    name: fruitflow-redis
    plan: free
    ipAllowList: []

databases:
  - name: fruitflow-db
    plan: free
