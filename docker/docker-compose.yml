name: fruitflow

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fruitflow}
      POSTGRES_USER: ${POSTGRES_USER:-fruitflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cambiame}
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fruitflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports: ["6379:6379"]
    volumes: [redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-fruitflow}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-cambiame123}
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]

  backend:
    build: {context: .., dockerfile: docker/Dockerfile, target: backend}
    env_file: ../.env
    ports: ["8000:8000"]
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}
    volumes: ["../backend:/app/backend:ro"]

  bot:
    build: {context: .., dockerfile: docker/Dockerfile, target: bot}
    env_file: ../.env
    depends_on: [backend]

  worker:
    build: {context: .., dockerfile: docker/Dockerfile, target: worker}
    env_file: ../.env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_started}

volumes:
  pgdata: {}
  redisdata: {}
  miniodata: {}
